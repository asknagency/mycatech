<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>My Awesome Blog | My Awesome Blog</title>
  <meta name="description" content="">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="stylesheet" href="/style.css">
  <script>window._CMS_DATA = {"settings":{"siteName":"My Awesome Blog","siteDescription":""},"posts":[]};</script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-[var(--primary, #14b8a6)]">My Awesome Blog</a>
      <a href="/" class="text-sm font-medium text-gray-500 hover:text-gray-900">&larr; Back to Feed</a>
    </div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto px-4 py-10 w-full bg-white shadow-sm sm:my-8 sm:rounded-2xl sm:border border-gray-100">
    <article id="post-container" class="prose prose-lg max-w-none prose-a:text-[var(--primary,#14b8a6)]">
      <div class="animate-pulse flex flex-col space-y-4">
        <div class="h-8 bg-gray-200 rounded w-3/4"></div>
        <div class="h-4 bg-gray-200 rounded w-1/4 mb-8"></div>
        <div class="h-64 bg-gray-200 rounded w-full"></div>
        <div class="h-4 bg-gray-200 rounded w-full"></div>
        <div class="h-4 bg-gray-200 rounded w-5/6"></div>
      </div>
    </article>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-3xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
      &copy; <script>document.write(new Date().getFullYear())</script> My Awesome Blog.
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('post-container');
      const data = window._CMS_DATA;
      
      // Get post slug from URL
      const urlParams = new URLSearchParams(window.location.search);
      const postSlug = urlParams.get('p');

      if (!data || !data.posts) return (container.innerHTML = '<h1>Database Error</h1>');
      
      const post = data.posts.find(p => p.slug === postSlug || p.id === postSlug);
      
      if (!post) {
        window.location.href = '404.html';
        return;
      }

      // Update document title dynamically based on the specific post
      document.title = `${post.title} | ${data.settings.siteName}`;

      // Render Blocks
      let htmlContent = '';
      
      // Render Header
      if (post.featuredImage) {
        htmlContent += `<img src="${post.featuredImage}" alt="${post.title}" class="w-full h-[400px] object-cover rounded-xl mb-8">`;
      }
      htmlContent += `<h1 class="text-4xl font-extrabold tracking-tight mb-2">${post.title}</h1>`;
      if (post.date) {
        htmlContent += `<p class="text-gray-500 text-sm mb-8 font-medium">Published on ${new Date(post.date).toLocaleDateString()}</p>`;
      }

      // Process CMS JSON Blocks
      if (post.blocks && Array.isArray(post.blocks)) {
        post.blocks.forEach(block => {
          if (block.type === 'text') {
            htmlContent += marked.parse(block.content || '');
          } else if (block.type === 'image' && block.src) {
            htmlContent += `<figure class="my-8"><img src="${block.src}" alt="${block.alt || ''}" class="rounded-lg w-full h-auto" loading="lazy"><figcaption class="text-center text-sm text-gray-500 mt-2">${block.caption || ''}</figcaption></figure>`;
          } else if (block.type === 'video' && block.url) {
            let embedUrl = block.url;
            if (embedUrl.includes('youtube.com/watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
            else if (embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
            htmlContent += `<div class="aspect-video w-full my-8"><iframe src="${embedUrl}" class="w-full h-full rounded-lg" frameborder="0" allowfullscreen></iframe></div>`;
          }
        });
      }

      container.innerHTML = htmlContent;
    });
  </script>
</body>
</html>
