<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | The Daily Pulse</title>
    
    <meta property="og:title" content="{{title}}">
    <meta property="og:type" content="article">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: { brand: '#111827', accent: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { -webkit-font-smoothing: antialiased; }
        
        /* CMS Specific Styles injected by the editor */
        .npm-media-block { margin: 2rem 0; width: 100%; border-radius: 0.5rem; overflow: hidden; }
        .npm-media-block[data-display="grid"] { display: grid; gap: 0.5rem; }
        .npm-media-block[data-display="grid"][data-cols="2"] { grid-template-columns: repeat(2, 1fr); }
        .npm-media-item img { width: 100%; height: 100%; object-fit: cover; }
        .npm-media-block figcaption { font-size: 0.875rem; color: #6b7280; text-align: center; margin-top: 0.5rem; font-style: italic; }
    </style>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="../index.html" class="text-lg font-extrabold tracking-tight text-brand flex items-center gap-2">
                <i class="ph-fill ph-lightning text-accent text-xl"></i> The Daily Pulse
            </a>
            <a href="../index.html" class="text-sm font-medium text-gray-500 hover:text-accent transition-colors flex items-center gap-1">
                <i class="ph ph-arrow-left"></i> Back to Home
            </a>
        </div>
    </header>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-12 md:py-20">
        <article class="prose prose-lg prose-blue max-w-none prose-headings:font-bold prose-headings:tracking-tight prose-a:text-accent prose-img:rounded-xl">
            <h1 class="text-3xl md:text-5xl font-extrabold text-brand leading-tight mb-8">{{title}}</h1>
            
            {{content}}
            
        </article>
        
        <div class="mt-12 pt-8 border-t border-gray-100 flex items-center justify-between">
            <div class="text-sm font-bold text-gray-400 uppercase tracking-wider">Share this article</div>
            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 text-gray-600 flex items-center justify-center transition-colors"><i class="ph-fill ph-x-logo text-lg"></i></button>
                <button class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 text-gray-600 flex items-center justify-center transition-colors"><i class="ph-fill ph-facebook-logo text-lg"></i></button>
                <button class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 text-gray-600 flex items-center justify-center transition-colors"><i class="ph ph-link text-lg"></i></button>
            </div>
        </div>
    </main>

    <footer class="bg-gray-50 border-t border-gray-200 py-8 mt-auto">
        <div class="max-w-4xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; <span id="year"></span> The Daily Pulse. All rights reserved.
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
