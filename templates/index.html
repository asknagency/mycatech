<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blog Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {
                colors: { brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }, dark: { bg: '#121212', surface: '#1e1e1e', border: '#2d2d2d' } },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
            }}
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
    </head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col antialiased">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-dark-surface/80 backdrop-blur-md border-b border-gray-200 dark:border-dark-border transition-colors">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-brand-500 text-white flex items-center justify-center font-bold shadow-lg shadow-brand-500/30 group-hover:scale-105 transition-transform">
                    <i class="ph ph-files text-lg"></i>
                </div>
                <span class="font-bold text-lg tracking-tight">Our Blog</span>
            </a>
            <button id="theme-toggle" aria-label="Toggle Dark Mode" class="p-2 text-gray-500 dark:text-gray-400 hover:text-brand-500 hover:bg-gray-100 dark:hover:bg-dark-bg rounded-full transition-all">
                <i class="ph ph-sun text-xl dark:hidden"></i>
                <i class="ph-fill ph-moon text-xl hidden dark:block"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 flex flex-col gap-12">
        
        <section id="featured-section" class="hidden">
            <h2 class="text-sm font-bold uppercase tracking-wider text-brand-500 mb-6 flex items-center gap-2"><i class="ph-fill ph-star"></i> Featured Posts</h2>
            <div id="featured-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

        <section id="recent-section" class="hidden">
            <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-6 flex items-center gap-2"><i class="ph ph-clock"></i> Latest Articles</h2>
            <div id="recent-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
        
        <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center py-20 text-gray-400">
            <i class="ph ph-article text-6xl mb-4 opacity-50"></i>
            <p class="text-sm font-medium">No posts published yet.</p>
        </div>

    </main>

    <footer class="border-t border-gray-200 dark:border-dark-border mt-auto">
        <div class="max-w-5xl mx-auto px-4 py-8 text-center text-xs text-gray-500 dark:text-gray-400">
            &copy; <span id="year"></span>. Published via CMS Hub Pro.
        </div>
    </footer>

    <script>
        // Theme Toggle Logic
        const html = document.documentElement;
        const toggleBtn = document.getElementById('theme-toggle');
        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            html.classList.toggle('dark', isDark);
        };
        initTheme();
        toggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });
        document.getElementById('year').textContent = new Date().getFullYear();

        // Data Hydration Logic
        const formatDate = (dateStr) => {
            const d = new Date(dateStr);
            return isNaN(d) ? dateStr : new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).format(d);
        };

        const createCard = (post, isLarge = false) => {
            const url = `posts/${post.slug}.html`; // Adjust relative to target.postsDir config
            const tagsHtml = post.tags && post.tags.length ? post.tags.slice(0, 2).map(t => `<span class="bg-gray-100 dark:bg-dark-border text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded text-[10px] font-medium">#${t}</span>`).join('') : '';
            const imgHtml = post.featuredImage 
                ? `<div class="${isLarge ? 'h-48 md:h-64' : 'h-40'} w-full overflow-hidden shrink-0"><img src="${post.featuredImage}" alt="${post.title}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"></div>`
                : `<div class="${isLarge ? 'h-48 md:h-64' : 'h-40'} w-full shrink-0 bg-gray-200 dark:bg-dark-surface flex items-center justify-center"><i class="ph ph-image text-3xl text-gray-400"></i></div>`;

            return `
                <a href="${url}" class="group flex flex-col bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-2xl overflow-hidden hover:shadow-xl hover:border-brand-300 dark:hover:border-brand-600 transition-all duration-300">
                    ${imgHtml}
                    <div class="p-5 flex flex-col flex-1">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[10px] text-gray-500 dark:text-gray-400 font-medium"><i class="ph ph-calendar-blank inline mr-1"></i>${formatDate(post.date)}</span>
                            ${tagsHtml}
                        </div>
                        <h3 class="${isLarge ? 'text-xl md:text-2xl' : 'text-lg'} font-bold leading-tight mb-2 group-hover:text-brand-500 transition-colors line-clamp-2">${post.title}</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-3 flex-1">${post.seoDescription || 'Read full article...'}</p>
                        <div class="mt-4 pt-4 border-t border-gray-100 dark:border-dark-border text-[11px] font-bold text-brand-500 uppercase tracking-wider group-hover:translate-x-1 transition-transform inline-flex items-center">
                            Read Post <i class="ph ph-arrow-right ml-1"></i>
                        </div>
                    </div>
                </a>
            `;
        };

        window.addEventListener('DOMContentLoaded', () => {
            const scriptTag = document.getElementById('cms-blog-data');
            if (!scriptTag) { document.getElementById('empty-state').classList.remove('hidden'); return; }

            try {
                const data = JSON.parse(scriptTag.textContent);
                const featContainer = document.getElementById('featured-container');
                const recContainer = document.getElementById('recent-container');

                if (data.featured && data.featured.length > 0) {
                    featContainer.innerHTML = data.featured.map(p => createCard(p, true)).join('');
                    document.getElementById('featured-section').classList.remove('hidden');
                }

                if (data.recent && data.recent.length > 0) {
                    recContainer.innerHTML = data.recent.map(p => createCard(p, false)).join('');
                    document.getElementById('recent-section').classList.remove('hidden');
                } else if (!data.featured || data.featured.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                }
            } catch (e) {
                console.error("Failed to parse CMS data", e);
                document.getElementById('empty-state').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
