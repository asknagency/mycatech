    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cmsData = document.getElementById('cms-blog-data') 
                            ? JSON.parse(document.getElementById('cms-blog-data').textContent) 
                            : { recent: [], featured: [], categories: [], siteMeta: {} };
            
            const siteMeta = cmsData.siteMeta || {};
            const allPosts = cmsData.recent || [];
            const categories = cmsData.categories || [];
            
            // --- URL BUILDING LOGIC ---
            const repoName = (siteMeta.repoName || '').trim().replace(/^\/|\/$/g, '');
            const blogDomain = (siteMeta.blogDomain || '').trim().replace(/^\/|\/$/g, '');
            const postsDir = (siteMeta.postsDir || 'posts').trim().replace(/^\/|\/$/g, '');

            let finalBase = '';
            if (blogDomain) {
                // If a domain is specified, use it as the absolute base
                finalBase = blogDomain.startsWith('http') ? blogDomain : `https://${blogDomain}`;
            } else {
                // Otherwise use repoName for GitHub Pages root-relative paths
                finalBase = repoName ? `/${repoName}` : '';
            }

            // Correct Header Links
            const rootPath = repoName && !blogDomain ? `/${repoName}/` : '/';
            document.getElementById('logo-link').href = rootPath;
            document.getElementById('home-link').href = rootPath;

            const grid = document.getElementById('post-grid');
            const filterContainer = document.getElementById('filter-container');

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "hover:text-gray-900 transition-colors pb-4 -mb-4 filter-btn skeleton-text";
                btn.textContent = cat.name;
                btn.setAttribute('data-cat', cat.id);
                btn.onclick = () => filterPosts(cat.id);
                filterContainer.appendChild(btn);
            });

            window.filterPosts = (catId) => {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    if (btn.getAttribute('data-cat') === catId) {
                        btn.classList.add('text-gray-900', 'border-b-2', 'border-gray-900');
                    } else {
                        btn.classList.remove('text-gray-900', 'border-b-2', 'border-gray-900');
                    }
                });
                const filtered = catId ? allPosts.filter(p => p.categories && p.categories.includes(catId)) : allPosts;
                renderGrid(filtered);
            };

            function renderGrid(posts) {
                if (posts.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-12 text-center text-gray-500 font-medium skeleton-text">No posts found.</div>`;
                    return;
                }

                grid.innerHTML = posts.map((post, index) => {
                    // Safe URL construction: Join segments and handle protocol
                    const cleanSlug = post.slug.replace(/^\/|\/$/g, '');
                    const path = `${postsDir}/${cleanSlug}.html`;
                    const postUrl = finalBase.endsWith('/') ? `${finalBase}${path}` : `${finalBase}/${path}`;

                    if (index === 0 && posts.length > 2) {
                        return `
                        <article class="gsap-card group cursor-pointer lg:col-span-2 relative flex flex-col justify-end min-h-[400px] rounded-xl overflow-hidden shadow-sm" onclick="window.location.href='${siteMeta.blogDomain}/${siteMeta.postsDir}/${post.slug}'">
                            <img src="${post.featuredImage || 'https://via.placeholder.com/1200x800?text=No+Image'}" alt="${post.title}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                            <div class="relative p-8 text-white z-10">
                                <h2 class="font-serif text-3xl md:text-5xl leading-tight mb-4 group-hover:text-gray-200 transition-colors skeleton-text">${post.title}</h2>
                                <p class="text-sm text-gray-300 font-medium skeleton-text">${new Date(post.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' })}</p>
                            </div>
                        </article>`;
                    }

                    return `
                    <article class="gsap-card group cursor-pointer flex flex-col" onclick="window.location.href='/${siteMeta.postsDir}/${post.slug}'">
                        <div class="img-container rounded-xl mb-4 aspect-video bg-gray-100">
                            <img src="${post.featuredImage || 'https://via.placeholder.com/800x450?text=No+Image'}" alt="${post.title}" class="w-full h-full object-cover">
                        </div>
                        <p class="text-xs text-gray-500 font-medium mb-2 uppercase tracking-wide skeleton-text">${new Date(post.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' })}</p>
                        <h3 class="font-serif text-xl font-semibold mb-2 group-hover:text-brand-blue transition-colors skeleton-text">${post.title}</h3>
                        <p class="text-sm text-gray-600 line-clamp-3 skeleton-text">${post.seoDescription || ''}</p>
                    </article>`;
                }).join('');

                initAnimations();
            }

            function initAnimations() {
                gsap.registerPlugin(ScrollTrigger);
                ScrollTrigger.getAll().forEach(t => t.kill());
                const tl = gsap.timeline({ defaults: { ease: "power3.out" } });
                tl.fromTo(".gsap-header", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8 })
                  .fromTo(".gsap-subnav", { y: -10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6 }, "-=0.4");

                gsap.utils.toArray('.gsap-card').forEach((card) => {
                    gsap.fromTo(card, { y: 40, opacity: 0 }, {
                        y: 0, opacity: 1, duration: 0.8, ease: "power2.out",
                        scrollTrigger: { trigger: card, start: "top 85%", toggleActions: "play none none none" }
                    });
                });
            }
            renderGrid(allPosts);
        });
    </script>
</body>
