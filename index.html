<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Pulse | Trending News & Events</title>
    <meta name="description" content="Your source for trending topics, happenings, events, football, MMA, and more.">
    <meta name="keywords" content="News, Trending, Football, MMA, Events, Blog">
    
    <meta property="og:title" content="The Daily Pulse">
    <meta property="og:description" content="Your source for trending topics, happenings, events, and sports.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: { brand: '#111827', accent: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { -webkit-font-smoothing: antialiased; }
        .tab-btn.active { border-bottom-color: #3b82f6; color: #111827; font-weight: 600; }
        .post-card:hover .post-img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-extrabold tracking-tight text-brand flex items-center gap-2">
                <i class="ph-fill ph-lightning text-accent text-2xl"></i> The Daily Pulse
            </a>
            
            <button class="md:hidden text-gray-600 hover:text-brand p-2" id="mobile-menu-btn" aria-label="Toggle Menu">
                <i class="ph ph-list text-2xl"></i>
            </button>

            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-600">
                <a href="/" class="hover:text-accent transition-colors">Home</a>
                <a href="#" class="hover:text-accent transition-colors">Categories</a>
                <a href="#" class="hover:text-accent transition-colors">About</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-10">
        
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-extrabold text-brand mb-4 tracking-tight">Stay in the Loop.</h1>
            <p class="text-gray-500 max-w-2xl text-lg">Discover the latest in trending topics, MMA highlights, football analysis, and global events.</p>
        </header>

        <div class="flex overflow-x-auto no-scrollbar border-b border-gray-200 mb-8 gap-6" id="tabs-container">
            <button class="tab-btn active pb-3 text-gray-500 whitespace-nowrap border-b-2 border-transparent transition-colors" data-filter="featured">Featured</button>
            <button class="tab-btn pb-3 text-gray-500 whitespace-nowrap border-b-2 border-transparent transition-colors" data-filter="recent">Recent</button>
            <button class="tab-btn pb-3 text-gray-500 whitespace-nowrap border-b-2 border-transparent transition-colors" data-filter="MMA">MMA</button>
            <button class="tab-btn pb-3 text-gray-500 whitespace-nowrap border-b-2 border-transparent transition-colors" data-filter="Football">Football</button>
            <button class="tab-btn pb-3 text-gray-500 whitespace-nowrap border-b-2 border-transparent transition-colors" data-filter="Trending">Trending</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="posts-grid">
            </div>
        
        <div id="empty-state" class="hidden text-center py-20 text-gray-500">
            <i class="ph ph-article text-4xl mb-2 text-gray-300"></i>
            <p>No posts found in this category.</p>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-8 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; <span id="year"></span> The Daily Pulse. All rights reserved.
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        let allPosts = [];
        const grid = document.getElementById('posts-grid');
        const emptyState = document.getElementById('empty-state');
        const tabs = document.querySelectorAll('.tab-btn');

        // Fetch posts
        async function loadPosts() {
            try {
                const res = await fetch('posts.json');
                allPosts = await res.json();
                
                // Sort by date descending
                allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderPosts('featured');
            } catch (error) {
                console.error("Failed to load posts", error);
                grid.innerHTML = '<p class="text-red-500 col-span-full">Failed to load content.</p>';
            }
        }

        function renderPosts(filter) {
            let filtered = [];
            if (filter === 'featured') {
                filtered = allPosts.filter(p => p.featured);
            } else if (filter === 'recent') {
                filtered = allPosts; // Already sorted
            } else {
                filtered = allPosts.filter(p => p.tags.toLowerCase().includes(filter.toLowerCase()));
            }

            grid.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(post => {
                    const mainTag = post.tags.split(',')[0].trim();
                    const dateStr = new Date(post.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    
                    const card = document.createElement('a');
                    card.href = `posts/${post.slug}.html`;
                    card.className = 'post-card group flex flex-col bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-md transition-shadow opacity-0';
                    card.innerHTML = `
                        <div class="relative h-56 overflow-hidden bg-gray-100">
                            <img src="${post.featuredImage}" alt="${post.title}" class="post-img w-full h-full object-cover transition-transform duration-500">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-md text-xs font-bold text-brand uppercase tracking-wider shadow-sm">
                                ${mainTag}
                            </div>
                        </div>
                        <div class="p-5 flex flex-col flex-1">
                            <div class="text-xs text-gray-400 mb-2 flex items-center gap-1.5"><i class="ph ph-calendar-blank"></i> ${dateStr}</div>
                            <h2 class="text-lg font-bold text-brand leading-tight mb-2 group-hover:text-accent transition-colors">${post.title}</h2>
                            <p class="text-sm text-gray-500 line-clamp-2 mt-auto">${post.seoDescription}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // GSAP Animation
                gsap.to('.post-card', {
                    y: 0,
                    opacity: 1,
                    duration: 0.5,
                    stagger: 0.1,
                    ease: 'power2.out',
                    clearProps: 'all' // Cleanup for responsive hover states
                });
            }
        }

        // Tab Logic
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                
                // Animate out current cards
                gsap.to('.post-card', {
                    y: 10,
                    opacity: 0,
                    duration: 0.2,
                    onComplete: () => renderPosts(e.target.dataset.filter)
                });
            });
        });

        loadPosts();
    </script>
</body>
</html>
