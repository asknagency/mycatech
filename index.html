    <style>
        :root {
            --bg: var(--theme-surface, #ffffff);
            --text: var(--theme-text, #1f2937);
            --brand: var(--theme-primary, #14b8a6);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 4rem 1.5rem; 
        }

        .page-header {
            margin-bottom: 4rem;
            text-align: center;
        }

        .page-header h1 { 
            font-size: 3rem; 
            margin: 0 0 1rem 0; 
            letter-spacing: -0.025em;
        }

        .page-header p {
            font-size: 1.125rem;
            color: color-mix(in srgb, var(--text) 70%, transparent);
            max-width: 600px;
            margin: 0 auto;
        }

        .post-grid { 
            display: grid; 
            gap: 2.5rem; 
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .post-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .post-card { 
            display: flex; 
            flex-direction: column; 
            background: color-mix(in srgb, var(--bg) 95%, var(--text));
            border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
            border-radius: 1rem; 
            overflow: hidden;
            text-decoration: none; 
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .post-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); 
        }

        .post-image { 
            height: 240px; 
            background: color-mix(in srgb, var(--text) 5%, transparent); 
            object-fit: cover; 
            width: 100%; 
        }

        .post-content { 
            padding: 1.75rem; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
        }

        .post-meta { 
            font-size: 0.875rem; 
            color: color-mix(in srgb, var(--text) 60%, transparent);
            margin-bottom: 0.75rem; 
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .featured-badge {
            color: #d97706;
            background: #fef3c7;
            padding: 0.1rem 0.5rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .post-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin: 0 0 0.75rem 0; 
            line-height: 1.3;
        }

        .post-desc { 
            font-size: 1rem; 
            color: color-mix(in srgb, var(--text) 80%, transparent);
            margin: 0 0 1.5rem 0; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            flex-grow: 1;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag { 
            font-size: 0.75rem; 
            background: var(--brand-light, color-mix(in srgb, var(--brand) 10%, transparent)); 
            color: var(--brand); 
            padding: 0.25rem 0.75rem; 
            border-radius: 99px; 
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Our Journal</h1>
            <p>Insights, updates, and stories deployed directly from CMS Hub Pro.</p>
        </header>

        <div id="posts-container" class="post-grid">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataScript = document.getElementById('cms-blog-data');
            const container = document.getElementById('posts-container');
            
            if (!dataScript) {
                container.innerHTML = '<p style="text-align:center;">Theme is active. Waiting for CMS to publish data.</p>';
                return;
            }
            
            try {
                // The CMS injects standard JSON data here
                const data = JSON.parse(dataScript.textContent);
                const allPosts = data.recent || [];

                if (allPosts.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:gray;">No posts published yet.</p>';
                    return;
                }

                container.innerHTML = allPosts.map(post => {
                    const date = new Date(post.date).toLocaleDateString('en-US', { 
                        year: 'numeric', month: 'short', day: 'numeric' 
                    });
                    
                    const tags = (post.tags || []).slice(0, 3).map(tag => 
                        `<span class="tag">#${tag}</span>`
                    ).join('');

                    // Default path assumes Target uses "posts" as HTML directory
                    return `
                        <a href="./posts/${post.slug}.html" class="post-card">
                            ${post.featuredImage 
                                ? `<img src="${post.featuredImage}" class="post-image" alt="${post.title}" loading="lazy">` 
                                : ''}
                            <div class="post-content">
                                <div class="post-meta">
                                    <span>${date}</span>
                                    ${post.featured ? '<span class="featured-badge">★ Featured</span>' : ''}
                                </div>
                                <h2 class="post-title">${post.title}</h2>
                                <p class="post-desc">${post.seoDescription || ''}</p>
                                <div class="tag-container">${tags}</div>
                            </div>
                        </a>
                    `;
                }).join('');

            } catch (err) {
                console.error('Failed to parse CMS Data:', err);
            }
        });
    </script>
</body>
