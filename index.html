<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Home | My Tech Blog</title>
  <meta name="description" content="Latest updates and articles.">
  <meta property="og:title" content="Home | My Tech Blog">
  <meta property="og:description" content="Latest updates and articles.">
  <meta property="og:type" content="website">
  
  <link rel="stylesheet" href="/style.css">

  <script>window._CMS_DATA = {"site":{"name":"My Tech Blog","domain":"https://asknagency.github.io/mycatech/"},"posts":[]};</script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-[var(--primary, #14b8a6)]">My Tech Blog</a>
      <nav class="text-sm font-medium text-gray-500">
        <a href="/" class="hover:text-gray-900 transition-colors">Home</a>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <div class="mb-8">
      <h1 class="text-3xl font-bold tracking-tight">Latest Updates</h1>
      <p class="text-gray-500 mt-2">Welcome to our blog feed.</p>
    </div>

    <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      </div>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-5xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
      &copy; <script>document.write(new Date().getFullYear())</script> My Tech Blog. All rights reserved.
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('post-grid');
      const data = window._CMS_DATA;

      if (!data || !data.posts || data.posts.length === 0) {
        grid.innerHTML = '<p class="text-gray-500 col-span-full py-10 text-center">No posts published yet.</p>';
        return;
      }

      // Sort posts by date (newest first)
      const sortedPosts = data.posts.sort((a, b) => new Date(b.date) - new Date(a.date));

      grid.innerHTML = sortedPosts.map(post => `
        <a href="layout.html?p=${post.slug || post.id}" class="group flex flex-col bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-lg transition-all hover:border-[var(--primary, #14b8a6)]">
          ${post.featuredImage 
            ? `<img src="${post.featuredImage}" alt="${post.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">`
            : `<div class="w-full h-48 bg-gray-100 flex items-center justify-center text-gray-400"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`
          }
          <div class="p-5 flex flex-col flex-1">
            <h2 class="text-lg font-bold mb-2 group-hover:text-[var(--primary, #14b8a6)] transition-colors line-clamp-2">${post.title}</h2>
            <p class="text-sm text-gray-500 mb-4 line-clamp-3 flex-1">${post.seoDescription || 'Read more about this topic...'}</p>
            <div class="flex items-center text-xs text-gray-400 font-medium mt-auto pt-4 border-t border-gray-100">
              <span>${post.date ? new Date(post.date).toLocaleDateString() : 'Recent'}</span>
            </div>
          </div>
        </a>
      `).join('');
    });
  </script>
</body>
</html>
