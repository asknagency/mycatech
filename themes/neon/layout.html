<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    {{head_inject}}

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: 'var(--theme-primary, #14b8a6)',
                            surface: 'var(--theme-surface, #ffffff)',
                            text: 'var(--theme-text, #111827)'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: var(--theme-surface);
            color: var(--theme-text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        
        /* CMS Specific Overrides */
        .npm-media-block { margin: 2.5rem 0; width: 100%; border-radius: 0.75rem; overflow: hidden; }
        .npm-media-block[data-display="grid"] { display: grid; gap: 1rem; }
        .npm-media-block[data-display="grid"][data-cols="2"] { grid-template-columns: repeat(2, 1fr); }
        .npm-media-block[data-display="grid"][data-cols="3"] { grid-template-columns: repeat(3, 1fr); }
        .npm-media-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 0.5rem; }
        .npm-media-item figcaption { text-align: center; font-size: 0.875rem; opacity: 0.7; margin-top: 0.5rem; }
    </style>
</head>
<body class="antialiased selection:bg-brand-primary selection:text-white">
    
    <div id="progress-bar" class="fixed top-0 left-0 h-1.5 bg-brand-primary z-50 origin-left scale-x-0 w-full rounded-r-full shadow-[0_0_10px_rgba(var(--theme-primary),0.5)]"></div>
    
    <nav class="max-w-3xl mx-auto px-6 py-10 flex justify-between items-center opacity-0 nav-reveal">
        <a href="/" class="text-lg font-bold tracking-tight hover:opacity-70 transition-opacity flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Home
        </a>
    </nav>

    <article class="max-w-3xl mx-auto px-6 pb-32 content-reveal opacity-0 translate-y-8">
        <header class="mb-12 border-b border-brand-text/10 pb-8">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-tight mb-4">{{title}}</h1>
        </header>

        <div class="prose prose-lg md:prose-xl max-w-none prose-headings:font-bold prose-a:text-brand-primary hover:prose-a:opacity-80 prose-img:rounded-xl prose-hr:border-brand-text/10" 
             style="--tw-prose-body: var(--theme-text); --tw-prose-headings: var(--theme-text); --tw-prose-bold: var(--theme-text); --tw-prose-quotes: var(--theme-text);">
            {{content}}
        </div>
    </article>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        
        // Initial Page Load Animations
        const tl = gsap.timeline();
        tl.to(".nav-reveal", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" })
          .to(".content-reveal", { opacity: 1, y: 0, duration: 1, ease: "power3.out" }, "-=0.6");

        // Reading Progress Bar
        gsap.to("#progress-bar", {
            scaleX: 1,
            ease: "none",
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 0.2
            }
        });

        // Staggered reveal for CMS image blocks as user scrolls
        gsap.utils.toArray('.npm-media-block').forEach(block => {
            gsap.from(block, {
                scrollTrigger: {
                    trigger: block,
                    start: "top 85%",
                },
                y: 40,
                opacity: 0,
                duration: 0.8,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
