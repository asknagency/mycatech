<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Posts</title>
    {{cms_data}}
    <style>
        /* Base Styles using dynamic CMS Theme Colors */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--theme-surface, #ffffff);
            color: var(--theme-text, #333333);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        .site-header {
            max-width: 760px;
            margin: 0 auto;
            padding: 4rem 1.5rem 2rem;
        }
        
        .site-header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.5rem;
            letter-spacing: -0.025em;
        }

        .site-header p {
            margin: 0;
            font-size: 1.125rem;
            opacity: 0.7;
        }

        .main-content {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .post-card {
            padding: 2rem 0;
            border-bottom: 1px solid rgba(128, 128, 128, 0.15);
            transition: opacity 0.2s;
        }

        .post-card:last-child {
            border-bottom: none;
        }
        
        .post-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            line-height: 1.3;
        }
        
        .post-title a {
            color: var(--theme-text, #333333);
            text-decoration: none;
        }
        
        .post-title a:hover {
            color: var(--theme-primary, #14b8a6);
        }
        
        .post-meta {
            font-size: 0.875rem;
            opacity: 0.6;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-meta span.featured-badge {
            background-color: var(--theme-primary, #14b8a6);
            color: white;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .post-summary {
            margin: 0 0 1rem 0;
            opacity: 0.85;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .read-more {
            display: inline-flex;
            align-items: center;
            color: var(--theme-primary, #14b8a6);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .read-more:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1>Latest Articles</h1>
        <p>Insights, updates, and stories.</p>
    </header>

    <main class="main-content">
        <div id="posts-container">
            <p style="opacity: 0.5;">Loading posts...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('posts-container');
            
            try {
                // Find the JSON data injected by CMS Hub Pro
                const dataScript = document.getElementById('cms-blog-data');
                if (!dataScript) {
                    container.innerHTML = '<p>No post data found. Publish a post to see it here.</p>';
                    return;
                }
                
                const cmsData = JSON.parse(dataScript.textContent);
                const posts = cmsData.recent || [];
                
                if (posts.length === 0) {
                    container.innerHTML = '<p>No posts published yet.</p>';
                    return;
                }

                let html = '';
                posts.forEach(post => {
                    // Links default to the /posts/ directory configured in CMS target settings
                    const postUrl = `posts/${post.slug}.html`;
                    
                    const date = new Date(post.date).toLocaleDateString('en-US', { 
                        year: 'numeric', month: 'long', day: 'numeric' 
                    });
                    
                    const featuredBadge = post.featured ? `<span class="featured-badge">Featured</span>` : '';
                    
                    html += `
                        <article class="post-card">
                            <h2 class="post-title"><a href="${postUrl}">${post.title || 'Untitled'}</a></h2>
                            <div class="post-meta">
                                ${featuredBadge}
                                <time datetime="${post.date}">${date}</time>
                            </div>
                            <p class="post-summary">${post.seoDescription || 'Read the full article to learn more...'}</p>
                            <a href="${postUrl}" class="read-more">Read article →</a>
                        </article>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (err) {
                console.error('Error rendering posts:', err);
                container.innerHTML = '<p>Oops! Something went wrong loading the feed.</p>';
            }
        });
    </script>
</body>
</html>
