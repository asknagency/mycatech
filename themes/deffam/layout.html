<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    {{head_inject}}
    <style>
        /* Base Styles using dynamic CMS Theme Colors */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--theme-surface, #ffffff);
            color: var(--theme-text, #333333);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        
        .site-header {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(128, 128, 128, 0.15);
        }
        
        .site-header a {
            text-decoration: none;
            color: var(--theme-text, #333333);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .main-content {
            max-width: 760px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        /* Generated Markdown Content Styling */
        .main-content h1, .main-content h2, .main-content h3 {
            margin-top: 2em;
            margin-bottom: 0.75em;
            line-height: 1.3;
        }
        
        .main-content h1 { font-size: 2.25rem; margin-top: 0; }
        
        .main-content img, .main-content iframe, .main-content video {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        .main-content a {
            color: var(--theme-primary, #14b8a6);
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 2px;
        }

        .main-content a:hover {
            opacity: 0.8;
        }

        .main-content blockquote {
            border-left: 4px solid var(--theme-primary, #14b8a6);
            padding-left: 1.25rem;
            margin-left: 0;
            margin-right: 0;
            font-style: italic;
            opacity: 0.8;
            background: rgba(128, 128, 128, 0.05);
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            border-radius: 0 8px 8px 0;
        }

        .main-content pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9em;
        }

        .main-content code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background: rgba(128, 128, 128, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .site-footer {
            max-width: 760px;
            margin: 4rem auto 2rem;
            padding: 2rem 1.5rem 0;
            border-top: 1px solid rgba(128, 128, 128, 0.15);
            text-align: center;
            font-size: 0.875rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="../">← Home</a>
    </header>

    <main class="main-content">
        {{content}}
    </main>

    <footer class="site-footer">
        &copy; <script>document.write(new Date().getFullYear())</script> Published via CMS Hub Pro.
    </footer>
</body>
</html>
