<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    {{head_inject}}
    <style>
        /* SOHO Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--theme-surface);
            color: var(--theme-text);
            line-height: 1.6;
        }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: var(--theme-surface); border-bottom: 1px solid #1a1a1a; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: 2px; text-decoration: none; color: var(--theme-text); }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 30px; }
        nav ul li a { text-decoration: none; color: #888; font-size: 14px; transition: 0.3s; }
        nav ul li a:hover { color: var(--theme-text); border-bottom: 2px solid var(--theme-primary); padding-bottom: 5px; }

        /* Post Content Styling */
        .post-container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .post-content h1, .post-content h2, .post-content h3 { margin-top: 2rem; margin-bottom: 1rem; font-weight: 700; }
        .post-content p { margin-bottom: 1.5rem; color: #ccc; font-size: 16px; }
        .post-content a { color: var(--theme-primary); text-decoration: none; }
        .post-content a:hover { text-decoration: underline; }
        .post-content blockquote { border-left: 3px solid var(--theme-primary); padding-left: 1rem; font-style: italic; color: #888; margin-bottom: 1.5rem; }
        
        /* CMS Media Blocks */
        .npm-media-block { margin: 2rem 0; width: 100%; display: flex; flex-direction: column; gap: 0.5rem; }
        .npm-media-block[data-display="grid"] { display: grid; gap: 10px; }
        .npm-media-block[data-display="grid"][data-cols="2"] { grid-template-columns: repeat(2, 1fr); }
        .npm-media-block img { width: 100%; height: auto; border-radius: 4px; }

        /* Footer */
        footer { background: #0a0a0a; padding: 80px 10% 40px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; border-top: 1px solid #1a1a1a; margin-top: 80px; }
        .footer-col h4 { margin-bottom: 20px; font-size: 16px; color: var(--theme-text); }
        .footer-col p, .footer-col a { color: #666; font-size: 14px; text-decoration: none; display: block; margin-bottom: 8px; }
        .footer-logo { font-size: 32px; font-weight: 800; color: #333; margin-bottom: 20px; }
        .copyright { grid-column: 1 / -1; margin-top: 40px; color: #444; font-size: 12px; }

        @media (max-width: 900px) { footer { grid-template-columns: repeat(2, 1fr); } header { flex-direction: column; gap: 20px; } nav ul li { margin: 0 15px; } }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">SOHO</a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="#">Works</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </nav>
    </header>

    <main class="post-container">
        <article class="post-content">
            {{content}}
        </article>
    </main>

    <footer>
        <div class="footer-col"><div class="footer-logo">SOHO</div></div>
        <div class="footer-col">
            <h4>Find Us Here</h4>
            <p>SOHO Co.</p>
            <p>155 Sixth Avenue, 12th Floor</p>
            <p>New York, NY, USA</p>
        </div>
        <div class="footer-col">
            <h4>Want to Say Hi?</h4>
            <p>Phone: 800 1234 56 78</p>
            <p>Email: <a href="mailto:info@yoursite.com" style="display:inline; color:var(--theme-primary);">info@yoursite.com</a></p>
        </div>
        <div class="footer-col">
            <h4>Also Visit Us On</h4>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
        </div>
        <div class="copyright">© 2026 SOHO Pro Blog</div>
    </footer>

</body>
</html>
