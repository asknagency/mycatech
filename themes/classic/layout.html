<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="description" content="{{seoDescription}}">
    <link rel="canonical" href="{{canonicalUrl}}">
    
    {{head_inject}}
    
    

    <script id="tailwind-theme" type="application/json">
    {
      "theme": {
        "extend": {
          "colors": {
            "brand": {
              "primary": "#201c87",
              "light": "#f5f5f5"
            }
          },
          "fontFamily": {
            "sans": ["Inter", "sans-serif"],
            "serif": ["Playfair Display", "serif"]
          }
        }
      }
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            document.documentElement.classList.add('font-loading');
            if (document.fonts) {
                document.fonts.ready.then(function() {
                    document.documentElement.classList.remove('font-loading');
                    document.documentElement.classList.add('font-loaded');
                });
            } else {
                setTimeout(function() {
                    document.documentElement.classList.remove('font-loading');
                    document.documentElement.classList.add('font-loaded');
                }, 1500);
            }
        })();
    </script>

    <script>
        // Keeping this for the CDN version of Tailwind to function in the browser
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { primary: 'var(--theme-primary, #201c87)', light: 'var(--theme-surface, #f5f5f5)' } }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .img-container { overflow: hidden; }
        .img-container img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .group:hover .img-container img { transform: scale(1.05); }

        .font-loading .skeleton-text { 
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
            color: transparent !important; 
            border-radius: 4px; 
            display: inline-block;
        }
        @media (prefers-color-scheme: dark) { 
            .font-loading .skeleton-text { background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%); } 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .font-loaded .skeleton-text { background: none; animation: none; color: inherit !important; transition: color 0.3s ease-in; }

        .prose { max-w-none; }
        .prose h1, .prose h2, .prose h3 { font-family: 'Playfair Display', serif; color: #111827; margin-top: 2rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; color: #374151; }
        .prose a { color: var(--theme-primary, #201c87); text-decoration: underline; }
        .prose img { border-radius: 0.75rem; margin-top: 2rem; margin-bottom: 2rem; }
    </style>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-white text-gray-900 antialiased selection:bg-brand-primary selection:text-white">

    <header class="gsap-header sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="/" id="layout-logo" class="font-serif text-2xl font-bold tracking-tight text-gray-900 skeleton-text">Whereby</a>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="/" id="layout-home" class="text-gray-600 hover:text-gray-900 skeleton-text">Home</a>
                <a href="#" class="text-gray-600 hover:text-gray-900 flex items-center gap-1 skeleton-text">Product <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></a>
                <a href="#" class="text-gray-600 hover:text-gray-900 skeleton-text">Support</a>
                <a href="#" class="bg-brand-primary text-white px-5 py-2.5 rounded-lg hover:bg-opacity-90 transition-colors skeleton-text">Try for free</a>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <article class="gsap-content prose prose-lg">
            <h1 class="text-4xl md:text-5xl font-serif font-bold leading-tight mb-8 skeleton-text">{{title}}</h1>
            {{content}}
        </article>
    </main>

    <footer class="gsap-footer border-t border-gray-200 mt-12 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8 text-sm">
                <div>
                    <h4 class="font-serif font-semibold text-gray-900 mb-6 text-lg skeleton-text">About</h4>
                    <ul class="space-y-4 text-gray-600">
                        <li><a href="#" class="hover:text-brand-primary transition-colors skeleton-text">About us</a></li>
                        <li><a href="#" class="hover:text-brand-primary transition-colors skeleton-text">Our vision</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const pathParts = window.location.pathname.split('/').filter(p => p !== '');
            if (pathParts.length >= 2) {
                const isSubpath = pathParts.length > 2; 
                const rootPath = isSubpath ? `/${pathParts[0]}/` : '/';
                document.getElementById('layout-logo').href = rootPath;
                document.getElementById('layout-home').href = rootPath;
            }

            if(window.gsap) {
                gsap.fromTo(".gsap-header", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "power3.out" });
                gsap.fromTo(".gsap-content", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.2, ease: "power3.out" });
            } else {
                window.addEventListener('load', () => {
                    gsap.fromTo(".gsap-header", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "power3.out" });
                    gsap.fromTo(".gsap-content", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.2, ease: "power3.out" });
                });
            }
        });
    </script>
</body>
</html>
