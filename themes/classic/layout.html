<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{head_inject}}
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            blue: 'var(--theme-primary, #201c87)', // Uses CMS theme variable
                            light: 'var(--theme-surface, #f5f5f5)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .img-container { overflow: hidden; }
        .img-container img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .group:hover .img-container img { transform: scale(1.05); }

        /* Basic Markdown Prose Styling for injected content */
        .prose { max-w-none; }
        .prose h1, .prose h2, .prose h3 { font-family: 'Playfair Display', serif; color: #111827; margin-top: 2rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; color: #374151; }
        .prose a { color: var(--theme-primary, #201c87); text-decoration: underline; }
        .prose img { border-radius: 0.75rem; margin-top: 2rem; margin-bottom: 2rem; }
        .prose figure { margin-top: 2rem; margin-bottom: 2rem; }
        .prose figcaption { text-align: center; color: #6b7280; font-size: 0.875rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased selection:bg-brand-blue selection:text-white">

    <header class="gsap-header sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="/" class="font-serif text-2xl font-bold tracking-tight text-gray-900">Whereby</a>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="/" class="text-gray-600 hover:text-gray-900">Home</a>
                <a href="#" class="text-gray-600 hover:text-gray-900 flex items-center gap-1">Product <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></a>
                <a href="#" class="text-gray-600 hover:text-gray-900">Support</a>
                <a href="#" class="bg-brand-blue text-white px-5 py-2.5 rounded-lg hover:bg-opacity-90 transition-colors">Try for free</a>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <article class="gsap-content prose prose-lg">
            <h1 class="text-4xl md:text-5xl font-serif font-bold leading-tight mb-8">{{title}}</h1>
            
            {{content}}
        </article>
    </main>

    <footer class="gsap-footer border-t border-gray-200 mt-12 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8 text-sm">
                <div>
                    <h4 class="font-serif font-semibold text-gray-900 mb-6 text-lg">About</h4>
                    <ul class="space-y-4 text-gray-600">
                        <li><a href="#" class="hover:text-brand-blue transition-colors">About us</a></li>
                        <li><a href="#" class="hover:text-brand-blue transition-colors">Our vision</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.fromTo(".gsap-header", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "power3.out" });
            gsap.fromTo(".gsap-content", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.2, ease: "power3.out" });
        });
    </script>
</body>
</html>
